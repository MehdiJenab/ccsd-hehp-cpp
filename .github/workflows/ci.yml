name: CI

on:
  push:
    branches: [main, pass-1, pass-2]
  pull_request:
    branches: [main]

# Ubuntu 24.04 ships GCC 13 as the default; no PPA or update-alternatives needed.
# libjansson-dev is NOT required — replaced by nlohmann/json (FetchContent) in T10.

jobs:
  debug:
    name: Debug build + unit tests + regression
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin \
                                  ninja-build cmake python3
      - name: Configure
        run: cmake --preset debug
      - name: Build
        run: cmake --build --preset debug
      - name: Unit tests
        run: ctest --preset debug
      - name: Bit-exact regression
        run: python3 tests/run_mpi_regression.py \
                --executable build/debug/apps/ccsd_code

  asan:
    name: ASan + UBSan + regression
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin \
                                  ninja-build cmake python3
      - name: Configure
        run: cmake --preset asan
      - name: Build
        run: cmake --build --preset asan
      - name: Unit tests (sanitizer-safe only — MPI tests excluded under ASan)
        run: ctest --preset asan -L unit
      - name: Bit-exact regression (np=2; ASan+MPI requires small rank count)
        run: python3 tests/run_mpi_regression.py \
                --executable build/asan/apps/ccsd_code --np 2

  release-fast:
    name: release-fast + tolerance regression
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin \
                                  ninja-build cmake python3
      - name: Configure
        run: cmake --preset release-fast
      - name: Build
        run: cmake --build --preset release-fast
      - name: Tolerance-tier regression
        run: python3 tests/run_mpi_regression.py \
                --executable build/release-fast/apps/ccsd_code --tolerance 1e-9

  tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    needs: debug
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin \
                                  ninja-build cmake clang-tidy python3
      - name: Configure
        run: cmake --preset debug
      - name: Build (for compile_commands.json)
        run: cmake --build --preset debug
      - name: Run clang-tidy
        run: |
          clang-tidy -p build/debug --warnings-as-errors='*' \
            $(git ls-files 'apps/*.cpp' 'include/ccsd/*.h' 'src/*.cpp')

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin \
                                  ninja-build cmake python3 gcovr
      - name: Configure
        run: cmake --preset coverage
      - name: Build
        run: cmake --build --preset coverage
      - name: Unit tests
        run: ctest --preset coverage
      - name: Regression run for coverage
        run: python3 tests/run_mpi_regression.py \
                --executable build/coverage/apps/ccsd_code --np 4
      - name: Coverage report
        run: |
          gcovr --root . --filter 'src/' --filter 'include/' --txt \
                --print-summary --object-directory build/coverage || true
